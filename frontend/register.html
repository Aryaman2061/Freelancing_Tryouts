<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div class="container">

        <h2>Create Account</h2>

        <form id="signupForm">

            <input
                type="text"
                id="name"
                placeholder="Name"
                required>

            <input
                type="email"
                id="email"
                placeholder="Email"
                required>

            <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            <button type="submit">

                Register

            </button>

        </form>

        <hr>

        <div
            id="g_id_onload"
            data-client_id="52033151454-5u18ruov86rtlsdqn7l3e5ivse5fbmfk.apps.googleusercontent.com"
            data-callback="handleGoogleResponse">

        </div>

        <div class="g_id_signin" data-type="standard"></div>

    </div>

    <script src="js/register.js"></script>

    <script src="js/googleAuth.js"></script>
</body>
